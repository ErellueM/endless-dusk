name: GDScript Linting (gdlint)

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      # 1. Repository auschecken
      - name: Checkout code
        uses: actions/checkout@v4

      # 2. Python wird benötigt, um gdtoolkit zu installieren
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      # 3. Installation des GDScript Linters
      - name: Install gdtoolkit
        run: pip install gdtoolkit

      # 4. Linter ausführen
      # Dieser Befehl scannt alle .gd Dateien im Projekt.
      # Er gibt einen Fehlercode zurück, wenn Style-Verstöße gefunden werden.
      - name: Run gdlint
        run: gdlint .