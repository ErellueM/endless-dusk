name: GDScript Linting (gdlint)

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Install gdtoolkit
        run: pip install gdtoolkit

      - name: Run gdlint
         # 1. Erstelle eine temporäre Konfigurationsdatei im Root
         # 2. Suche die Dateien und führe gdlint aus
        # Wir übergeben NUR die Dateien. gdlint sucht sich die .gdlintrc im aktuellen Verzeichnis selbst.
        run: |
          echo '{"max-line-length": 200, "skip-checks": ["class-definitions-order", "unused-argument", "no-elif-return", "no-else-return", "trailing-whitespace"]}' > .gdlintrc
          find . -type d \( -path "./addons" -o -path "./tests" \) -prune -o -name "*.gd" -print | xargs gdlint || true